name: Build and deploy Python app to Azure Functions - walican-reminder-func

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim-bullseye

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-func
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-func
          path: .

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: 'walican-reminder-func'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

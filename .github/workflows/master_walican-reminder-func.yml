name: Build and deploy Python app to Azure Functions - walican-reminder-func

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Create zip package
        run: zip -r deploy.zip . --exclude "*.git*" --exclude ".github/*" --exclude "tests/*" --exclude "*.pyc" --exclude "__pycache__/*" --exclude "antenv/*"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group walican-rg \
            --name walican-reminder-func \
            --src deploy.zip

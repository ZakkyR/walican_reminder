name: Build and deploy Python app to Azure Web App - walican-reminder

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'requirements.txt'
      - 'startup.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim-bullseye

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv antenv
          antenv/bin/pip install --upgrade pip
          antenv/bin/pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'walican-reminder'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

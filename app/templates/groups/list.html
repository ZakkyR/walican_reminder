{% extends "base.html" %}
{% block title %}仲間グループ — Walican Reminder{% endblock %}
{% block content %}
<div class="page-header">
  <h1>仲間グループ</h1>
</div>
<div class="card">
  <form method="post" action="/groups">
    <div class="form-group">
      <label>グループ名</label>
      <input type="text" name="name" required placeholder="例: 旅行仲間">
    </div>
    <button type="submit" class="btn btn-primary">作成</button>
  </form>
</div>
{% for group in groups %}
  <div class="card" id="group-{{ group.id }}" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="/groups/{{ group.id }}" style="text-decoration:none;color:inherit;flex:1;">
      <div class="card-title">{{ group.name }}</div>
      <div style="font-size:0.8rem;color:#888;">{{ group.members|length }}人</div>
    </a>
    {% if group.created_by == user.id %}
      <button class="btn btn-danger" style="padding:4px 10px;font-size:0.8rem;margin-left:8px;"
        hx-delete="/groups/{{ group.id }}"
        hx-confirm="グループ「{{ group.name }}」を削除しますか？"
        hx-target="#group-{{ group.id }}"
        hx-swap="outerHTML">削除</button>
    {% endif %}
  </div>
{% else %}
  <p style="color:#888; text-align:center; margin-top:40px;">グループがありません。</p>
{% endfor %}
{% endblock %}

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Walican Reminder{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">🧾 Walican Reminder</a>
    <div class="nav-links">
      <a href="/groups">仲間グループ</a>
      <a href="/servers">サーバー</a>
      {% if user.discord_avatar_url %}
        <img src="{{ user.discord_avatar_url }}" class="avatar" alt="{{ user.discord_username }}" title="{{ user.discord_username }}">
      {% else %}
        <span class="avatar-placeholder" title="{{ user.discord_username }}">{{ user.discord_username[0]|upper }}</span>
      {% endif %}
      <a href="/logout">ログアウト</a>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

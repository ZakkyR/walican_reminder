{% if members %}
  <div style="max-height:240px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:6px;margin-top:8px;">
    {% for m in members %}
      <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #f0f0f0;cursor:pointer;"
           data-name="{{ m.username | e }}"
           onclick="
             var inp = document.getElementById('member-name-input');
             if (inp) { inp.value = this.dataset.name; inp.focus(); }
           "
           onmouseover="this.style.background='#f5f5f5'"
           onmouseout="this.style.background=''">
        {% if m.avatar_url %}
          <img src="{{ m.avatar_url }}" class="avatar" alt="{{ m.display_name }}">
        {% else %}
          <span class="avatar-placeholder">{{ m.display_name[0]|upper }}</span>
        {% endif %}
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.9rem;">{{ m.display_name }}</div>
          {% if m.display_name != m.username %}
            <div style="font-size:0.75rem;color:#aaa;">{{ m.username }}</div>
          {% endif %}
        </div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p style="color:#888;font-size:0.85rem;margin-top:8px;">メンバーが見つかりません。Bot がサーバーに参加しているか確認してください。</p>
{% endif %}

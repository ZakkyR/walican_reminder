{% if user_guilds %}
<details style="margin-top:10px;">
  <summary style="cursor:pointer;font-size:0.85rem;color:#5865f2;user-select:none;">サーバーから選ぶ</summary>
  <div style="margin-top:8px;">
    <select id="guild-select-{{ picker_id }}"
            style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;"
            onchange="
              if (!this.value) { document.getElementById('server-member-list-{{ picker_id }}').innerHTML = ''; return; }
              htmx.ajax('GET', '/api/server-members?guild_id=' + this.value + '{{ context_param | default("") }}', {target: '#server-member-list-{{ picker_id }}', swap: 'innerHTML'})
            ">
      <option value="">サーバーを選択...</option>
      {% for guild in user_guilds %}
        <option value="{{ guild.guild_id }}">{{ guild.guild_name }}</option>
      {% endfor %}
    </select>
    <div id="server-member-list-{{ picker_id }}"></div>
  </div>
</details>
{% endif %}

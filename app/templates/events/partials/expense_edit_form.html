<div class="card" style="margin-bottom:8px;border:2px solid #5865f2;">
  <div class="card-title" style="margin-bottom:12px;">支出を編集</div>
  <form method="post" action="/events/{{ event_id }}/expenses/{{ expense.id }}/edit">
    <div class="form-group">
      <label>タイトル *</label>
      <input type="text" name="title" required value="{{ expense.title }}">
    </div>
    <div class="form-group">
      <label>金額（円）*</label>
      <input type="number" name="total_amount" required min="1" value="{{ expense.total_amount|int }}">
    </div>
    <div class="form-group">
      <label>立替者 *</label>
      <select name="paid_by" required>
        {% for p in participants %}
          <option value="{{ p.id }}" {% if p.id == expense.paid_by %}selected{% endif %}>
            {{ display_names.get(p.id, p.discord_username) }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>参加者（カスタム金額は空欄で均等割り）</label>
      {% for p in participants %}
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <input type="checkbox" name="participant_ids" value="{{ p.id }}" id="ep_{{ p.id }}"
                 {% if p.id in expense_participant_map %}checked{% endif %}
                 style="width:auto;flex-shrink:0;">
          {% if p.discord_avatar_url %}
            <img src="{{ p.discord_avatar_url }}" class="avatar" alt="{{ display_names.get(p.id, p.discord_username) }}">
          {% else %}
            <span class="avatar-placeholder">{{ display_names.get(p.id, p.discord_username)[0]|upper }}</span>
          {% endif %}
          <label for="ep_{{ p.id }}" style="margin:0;flex:1;">{{ display_names.get(p.id, p.discord_username) }}</label>
          <input type="number" name="custom_{{ p.id }}"
                 placeholder="金額(円)"
                 value="{{ expense_participant_map[p.id]|int if p.id in expense_participant_map and expense_participant_map[p.id] else '' }}"
                 style="width:120px;">
        </div>
      {% endfor %}
    </div>
    <div style="display:flex;gap:8px;">
      <button type="submit" class="btn btn-primary">保存</button>
      <a href="/events/{{ event_id }}?tab=expenses" class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
</div>

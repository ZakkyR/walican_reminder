<div id="ep-{{ participant.id }}" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;">
  <span style="display:flex;align-items:center;gap:8px;">
    {% if participant.discord_avatar_url %}
      <img src="{{ participant.discord_avatar_url }}" class="avatar" alt="{{ participant.discord_username }}">
    {% else %}
      <span class="avatar-placeholder">{{ participant.discord_username[0]|upper }}</span>
    {% endif %}
    {{ participant.discord_username }}
    {% if participant.is_guest %}<span class="badge" style="background:#f0f0f0;color:#888;font-size:0.7rem;margin-left:4px;">未ログイン</span>{% endif %}
  </span>
  {% if participant.id != event.created_by %}
    <button class="btn btn-danger" style="padding:2px 10px;font-size:0.8rem;"
      hx-delete="/events/{{ event.id }}/participants/{{ participant.id }}"
      hx-target="#ep-{{ participant.id }}"
      hx-swap="outerHTML">削除</button>
  {% endif %}
</div>

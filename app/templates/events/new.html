{% extends "base.html" %}
{% block title %}イベント作成 — Walican Reminder{% endblock %}
{% block content %}
<div class="page-header">
  <h1>イベント作成</h1>
  <a href="/" class="btn btn-secondary">← 戻る</a>
</div>
<div class="card">
  <form method="post" action="/events">
    <div class="form-group">
      <label>イベント名 *</label>
      <input type="text" name="name" required placeholder="例: 北海道旅行 2025">
    </div>
    <div class="form-group">
      <label>説明</label>
      <textarea name="description" rows="2" placeholder="メモ（任意）"></textarea>
    </div>
    <div class="form-group">
      <label>支払期限</label>
      <input type="date" name="payment_deadline">
    </div>
    <div class="form-group">
      <label>仲間グループから一括追加（任意）</label>
      <select name="friend_group_id">
        <option value="">選択しない</option>
        {% for group in groups %}
          <option value="{{ group.id }}">{{ group.name }}（{{ group.members|length }}人）</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>個別追加（任意、複数選択可）</label>
      <select name="participant_ids" multiple style="height:150px;">
        {% for u in all_users %}
          <option value="{{ u.id }}">
            {{ u.discord_username }}{% if u.is_guest %} 〔未ログイン〕{% endif %}
          </option>
        {% endfor %}
      </select>
      <div style="font-size:0.75rem;color:#999;margin-top:4px;">Ctrl（Mac は ⌘）を押しながらクリックで複数選択</div>
    </div>
    <button type="submit" class="btn btn-primary">作成</button>
  </form>
</div>
{% endblock %}
